name: Build elementary OS WSL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:latest
      volumes:
        - /proc:/proc
      options: --privileged

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y live-build patch gnupg2 binutils zstd git curl

          # Install gh CLI for release step
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | gpg --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          apt-get install -y gh

          # Import Ubuntu archive keyring (from upstream build.sh)
          gpg --homedir /tmp --no-default-keyring --keyring /etc/apt/trusted.gpg \
            --recv-keys --keyserver keyserver.ubuntu.com \
            F6ECB3762474EDA9D21B7022871920D1991BC93C

          # Debootstrap workaround for noble (from upstream build.sh)
          ln -sfn /usr/share/debootstrap/scripts/gutsy /usr/share/debootstrap/scripts/noble

      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone elementary/os
        run: git clone --depth 1 https://github.com/elementary/os.git /tmp/elementary-os

      - name: Prepare build directory
        run: |
          # Following upstream build.sh: copy etc/* into tmp build dir
          BUILD_DIR="/tmp/elementary-os/tmp/amd64"
          mkdir -p "$BUILD_DIR"
          cp -r /tmp/elementary-os/etc/* "$BUILD_DIR/"
          cp -f /tmp/elementary-os/etc/terraform-amd64.conf "$BUILD_DIR/terraform.conf"

      - name: Customize for WSL
        run: |
          BUILD_DIR="/tmp/elementary-os/tmp/amd64"

          # Replace package list with WSL-only packages
          cat > "$BUILD_DIR/config/package-lists/desktop.list.chroot_install" << 'EOF'
          elementary-minimal
          elementary-standard
          io.elementary.terminal
          io.elementary.appcenter
          wslu
          ubuntu-wsl
          EOF

          # Remove ISO-only package lists
          rm -f "$BUILD_DIR/config/package-lists/desktop.list.chroot_live"
          rm -f "$BUILD_DIR/config/package-lists/pool.list.binary"

          # Skip kernel installation (WSL provides its own kernel)
          sed -i 's/--linux-packages linux-image/--linux-packages none/' "$BUILD_DIR/auto/config"

      - name: Run live-build
        run: |
          cd /tmp/elementary-os/tmp/amd64
          lb clean
          lb config
          lb bootstrap
          lb chroot

      - name: Extract version
        id: version
        run: |
          . /tmp/elementary-os/tmp/amd64/chroot/etc/os-release
          version=$(echo "$VERSION" | grep -o '[0-9][0-9.]*')
          if [ -z "$version" ]; then
            echo "::error::Failed to extract version from os-release"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Detected elementary OS version: ${version}"

      - name: Apply WSL customizations
        run: |
          CHROOT="/tmp/elementary-os/tmp/amd64/chroot"

          # WSL config files
          cp rootfs/etc/wsl-distribution.conf "$CHROOT/etc/"
          cp rootfs/etc/wsl.conf "$CHROOT/etc/"
          cp rootfs/etc/oobe.sh "$CHROOT/etc/"
          chmod +x "$CHROOT/etc/oobe.sh"

          # Terminal profile and icon for Windows integration
          mkdir -p "$CHROOT/usr/lib/wsl"
          cp terminal-profile.json "$CHROOT/usr/lib/wsl/"
          cp elementary-community.ico "$CHROOT/usr/lib/wsl/"

          # Mask systemd units that conflict with WSL
          mkdir -p "$CHROOT/etc/systemd/system"
          for unit in \
            systemd-resolved.service \
            systemd-networkd.service \
            NetworkManager.service \
            systemd-tmpfiles-setup.service \
            systemd-tmpfiles-clean.service \
            systemd-tmpfiles-clean.timer \
            systemd-tmpfiles-setup-dev-early.service \
            systemd-tmpfiles-setup-dev.service \
            tmp.mount; do
            ln -sf /dev/null "$CHROOT/etc/systemd/system/$unit"
          done

          # Remove resolv.conf so WSL generates it
          rm -f "$CHROOT/etc/resolv.conf"

      - name: Package rootfs
        run: |
          tar czf elementaryOS.wsl -C /tmp/elementary-os/tmp/amd64/chroot .
          ls -lh elementaryOS.wsl

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" --cleanup-tag -y 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            elementaryOS.wsl \
            --repo "${{ github.repository }}" \
            --title "elementary OS WSL ${{ steps.version.outputs.version }}" \
            --notes "$(cat <<'EOF'
          elementary OS WSL distribution image.

          ## Installation
          ```
          wsl --install --from-file elementaryOS.wsl
          ```
          EOF
          )"
