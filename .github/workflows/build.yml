name: Build elementary OS WSL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          version=$(docker run --rm ghcr.io/elementary/docker:stable bash -c '. /etc/os-release && echo "$VERSION_ID"')
          version=$(echo "$version" | tr -d '[:space:]')
          echo "version=v${version}" >> "$GITHUB_OUTPUT"
          echo "Detected elementary OS version: v${version}"

      - name: Export base rootfs
        run: |
          container_id=$(docker create ghcr.io/elementary/docker:stable)
          docker export "$container_id" -o rootfs.tar
          docker rm "$container_id"
          mkdir rootfs-work
          tar xf rootfs.tar -C rootfs-work

      - name: Apply WSL customizations
        run: |
          # WSL config files
          cp rootfs/etc/wsl-distribution.conf rootfs-work/etc/
          cp rootfs/etc/wsl.conf rootfs-work/etc/
          cp rootfs/etc/oobe.sh rootfs-work/etc/
          chmod +x rootfs-work/etc/oobe.sh

          # Terminal profile and icon
          mkdir -p rootfs-work/usr/lib/wsl
          cp terminal-profile.json rootfs-work/usr/lib/wsl/
          cp elementary-community.ico rootfs-work/usr/lib/wsl/

          # Mask systemd units that conflict with WSL
          for unit in \
            systemd-resolved.service \
            systemd-networkd.service \
            NetworkManager.service \
            systemd-tmpfiles-setup.service \
            systemd-tmpfiles-clean.service \
            systemd-tmpfiles-clean.timer \
            systemd-tmpfiles-setup-dev-early.service \
            systemd-tmpfiles-setup-dev.service \
            tmp.mount; do
            ln -sf /dev/null "rootfs-work/etc/systemd/system/$unit"
          done

          # Remove resolv.conf so WSL generates it
          rm -f rootfs-work/etc/resolv.conf

          # Clean up apt caches
          rm -rf rootfs-work/var/lib/apt/lists/* rootfs-work/tmp/* rootfs-work/var/tmp/*

      - name: Package rootfs
        run: |
          tar czf elementaryOS.wsl -C rootfs-work .
          ls -lh elementaryOS.wsl

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" --cleanup-tag -y 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            elementaryOS.wsl \
            --repo "${{ github.repository }}" \
            --title "elementary OS WSL ${{ steps.version.outputs.version }}" \
            --notes "$(cat <<'EOF'
          elementary OS WSL distribution image.

          ## Installation
          ```
          wsl --install --from-file elementaryOS.wsl
          ```
          EOF
          )"
